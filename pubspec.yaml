name: cocina360
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  flutter_bloc: ^9.1.1
  go_router: ^15.1.2
  drift: ^2.33.0
  sqlite3: ^3.3.2
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.3

flutter_launcher_icons:
  android: true
  image_path: "assets/brand/icon.png"

# Bundles the SQLite3MultipleCiphers build of sqlite3 (provides SQLCipher-
# compatible encryption). Replaces the retired sqlcipher_flutter_libs package;
# delivered via Dart build hooks / native assets.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:

  uses-material-design: true
  assets:
    - .env
    - assets/brand/icon.png

